name: doctor_app
description: "Doctor app for Telemedicine platform - Flutter application for doctors to manage appointments and conduct video consultations."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  dio: ^5.3.1
  http: ^1.1.0
  web_socket_channel: ^2.4.0
  provider: ^6.0.0
  flutter_webrtc: ^0.12.0
  shared_preferences: ^2.2.0
  socket_io_client: ^2.0.0+1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
