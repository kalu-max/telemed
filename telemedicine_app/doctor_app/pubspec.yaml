name: doctor_app
description: "Doctor app for Telemedicine platform - Flutter application for doctors to manage appointments and conduct video consultations."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  dio: ^5.3.1
  provider: ^6.0.0
  flutter_webrtc: ^0.12.0
  shared_preferences: ^2.2.0
  socket_io_client: ^2.0.0+1
  image_picker: ^1.0.4
  intl: ^0.19.0
  flutter_local_notifications: ^17.2.4
  pdf: ^3.10.8
  printing: ^5.12.0
  pointycastle: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
