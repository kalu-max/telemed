name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel older runs on the same branch to reduce queueing and timeout pressure.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  FLUTTER_VERSION: "3.41.2"
  BACKEND_PORT: "5000"
  BACKEND_HEALTH_URL: http://127.0.0.1:5000/health
  # Default public backend URL (can be overridden by secret in deploy job).
  PUBLIC_BACKEND_URL: https://telemed-backend.onrender.com

jobs:
  # Backend unit/integration test suite.
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: telemedicine_backend
    env:
      NODE_ENV: test
      DB_DIALECT: sqlite
      DB_STORAGE: ":memory:"
      FIREBASE_CONFIG: "{}"
      JWT_SECRET: ci-jwt-secret-not-for-production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: telemedicine_backend/package-lock.json

      - name: Load optional backend test secrets
        env:
          GH_SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          jwt_secret=$(jq -r '.JWT_SECRET // empty' <<< "$GH_SECRETS_JSON")
          if [ -n "$jwt_secret" ]; then
            echo "JWT_SECRET=$jwt_secret" >> "$GITHUB_ENV"
          fi

      - name: Install backend dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --prefer-offline --no-audit --no-fund
          else
            npm install --prefer-offline --no-audit --no-fund
          fi

      - name: Run backend tests
        run: npm test -- --forceExit

  # Start backend first, wait until /health is live, then run migrations.
  backend-runtime-and-migrations:
    name: Backend Runtime + Health Check + Migrations
    runs-on: ubuntu-latest
    needs: backend-tests
    timeout-minutes: 20
    defaults:
      run:
        working-directory: telemedicine_backend
    env:
      NODE_ENV: development
      PORT: "5000"
      DB_DIALECT: sqlite
      DB_STORAGE: .tmp/telemedicine-ci.sqlite
      DB_SYNC_ALTER: "true"
      FIREBASE_CONFIG: "{}"
      JWT_SECRET: ci-jwt-secret-not-for-production
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      LOG_LEVEL: warn

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: telemedicine_backend/package-lock.json

      - name: Install backend dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --prefer-offline --no-audit --no-fund
          else
            npm install --prefer-offline --no-audit --no-fund
          fi

      - name: Load optional backend runtime secrets
        env:
          GH_SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          jwt_secret=$(jq -r '.JWT_SECRET // empty' <<< "$GH_SECRETS_JSON")
          allowed_origins=$(jq -r '.ALLOWED_ORIGINS // empty' <<< "$GH_SECRETS_JSON")
          firebase_config=$(jq -r '.FIREBASE_CONFIG // empty' <<< "$GH_SECRETS_JSON")

          if [ -n "$jwt_secret" ]; then
            echo "JWT_SECRET=$jwt_secret" >> "$GITHUB_ENV"
          fi

          if [ -n "$allowed_origins" ]; then
            echo "ALLOWED_ORIGINS=$allowed_origins" >> "$GITHUB_ENV"
          fi

          if [ -n "$firebase_config" ]; then
            {
              echo "FIREBASE_CONFIG<<EOF"
              echo "$firebase_config"
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi

      - name: Prepare local CI database directory
        run: mkdir -p .tmp

      - name: Start backend server in background
        run: |
          nohup npm start > server.log 2>&1 &
          echo "BACKEND_PID=$!" >> "$GITHUB_ENV"
          echo "Started backend with PID $!"

      - name: Wait for backend health endpoint
        run: |
          max_attempts=40
          sleep_seconds=3

          for attempt in $(seq 1 "$max_attempts"); do
            status_code=$(curl --silent --output /dev/null --write-out "%{http_code}" --max-time 5 "$BACKEND_HEALTH_URL" || true)

            if [ "$status_code" = "200" ]; then
              echo "Backend is healthy (attempt $attempt)."
              exit 0
            fi

            echo "Attempt $attempt/$max_attempts: health check returned '$status_code'. Retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

          echo "::error::Backend did not become healthy in time."
          echo "----- Backend logs -----"
          tail -n 200 server.log || true
          exit 1

      - name: Run database migrations (retry on transient failures)
        run: |
          max_attempts=5
          sleep_seconds=5

          for attempt in $(seq 1 "$max_attempts"); do
            if npm run migrate; then
              echo "Migrations applied successfully."
              npm run migrate:status
              exit 0
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "::error::Migrations failed after $max_attempts attempts."
              exit 1
            fi

            echo "Migration attempt $attempt/$max_attempts failed. Retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

      - name: Print backend logs when job fails
        if: failure()
        run: tail -n 250 server.log || true

      - name: Stop backend server
        if: always()
        run: |
          if [ -n "${BACKEND_PID:-}" ] && kill -0 "${BACKEND_PID}" 2>/dev/null; then
            kill "${BACKEND_PID}"
            wait "${BACKEND_PID}" || true
          fi

  # Build both Flutter apps in parallel to reduce total CI duration.
  frontend-builds:
    name: Build ${{ matrix.app_name }} app
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - app_name: patient
            app_path: telemedicine_app
            artifact_name: patient-web-build
          - app_name: doctor
            app_path: telemedicine_app/doctor_app
            artifact_name: doctor-web-build
    defaults:
      run:
        working-directory: ${{ matrix.app_path }}
    env:
      API_BASE_URL: https://telemed-backend.onrender.com
      WS_BASE_URL: wss://telemed-backend.onrender.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Load optional frontend URL secrets
        env:
          GH_SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          api_base_url=$(jq -r '.API_BASE_URL // empty' <<< "$GH_SECRETS_JSON")
          ws_base_url=$(jq -r '.WS_BASE_URL // empty' <<< "$GH_SECRETS_JSON")

          if [ -n "$api_base_url" ]; then
            echo "API_BASE_URL=$api_base_url" >> "$GITHUB_ENV"
          fi

          if [ -n "$ws_base_url" ]; then
            echo "WS_BASE_URL=$ws_base_url" >> "$GITHUB_ENV"
          fi

      - name: Enable Flutter web target
        run: flutter config --enable-web

      - name: Install app dependencies
        run: flutter pub get

      - name: Analyze app source
        run: flutter analyze --no-fatal-infos

      - name: Run app tests
        run: flutter test --no-pub

      - name: Build app for web (release)
        run: |
          flutter build web --release \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=WS_BASE_URL="$WS_BASE_URL"

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.app_path }}/build/web
          if-no-files-found: error
          retention-days: 7

  # Deployment is allowed only after backend + both app builds succeed.
  deploy:
    name: Deploy and Verify
    runs-on: ubuntu-latest
    needs: [backend-runtime-and-migrations, frontend-builds]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - name: Trigger Render deployment hook (optional)
        env:
          GH_SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          hook_url=$(jq -r '.RENDER_DEPLOY_HOOK_URL // empty' <<< "$GH_SECRETS_JSON")

          if [ -n "$hook_url" ]; then
            curl --fail --show-error --silent --request POST "$hook_url"
            echo "Render deploy hook triggered."
          else
            echo "RENDER_DEPLOY_HOOK_URL secret not set; skipping explicit deploy hook trigger."
          fi

      - name: Wait for deployed backend health
        env:
          GH_SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          secret_public_backend_url=$(jq -r '.PUBLIC_BACKEND_URL // empty' <<< "$GH_SECRETS_JSON")
          public_backend_url="${secret_public_backend_url:-$PUBLIC_BACKEND_URL}"
          health_url="${public_backend_url%/}/health"
          echo "Checking deployed backend at: $health_url"

          max_attempts=40
          sleep_seconds=15

          for attempt in $(seq 1 "$max_attempts"); do
            if curl --fail --silent --show-error --max-time 10 "$health_url" >/dev/null; then
              echo "Deployment health check passed on attempt $attempt."
              exit 0
            fi

            echo "Attempt $attempt/$max_attempts failed. Waiting ${sleep_seconds}s before retry..."
            sleep "$sleep_seconds"
          done

          echo "::error::Deployment health check failed after retries."
          exit 1
