name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ───────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telemedicine_backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: telemedicine_backend/package-lock.json

      - run: npm ci
      - run: npm test -- --forceExit

  # ── Patient App ─────────────────────────────────────────────────────
  patient-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telemedicine_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  # ── Doctor App ──────────────────────────────────────────────────────
  doctor-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telemedicine_app/doctor_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  # ── Database Migrations (dry-run) ──────────────────────────────────
  migrations:
    runs-on: ubuntu-latest
    needs: backend
    defaults:
      run:
        working-directory: telemedicine_backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: telemedicine_backend/package-lock.json

      - run: npm ci
      - run: npm run migrate:status
        env:
          NODE_ENV: test
