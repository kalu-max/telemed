name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: "3.41.2"

jobs:
  # ── Backend Tests ───────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telemedicine_backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: telemedicine_backend/package-lock.json

      - run: npm ci
      - run: npm test -- --forceExit

  # ── Patient App ─────────────────────────────────────────────────────
  patient-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telemedicine_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  # ── Doctor App ──────────────────────────────────────────────────────
  doctor-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telemedicine_app/doctor_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  # ── Database Migrations (dry-run) ──────────────────────────────────
  migrations:
    runs-on: ubuntu-latest
    needs: backend
    defaults:
      run:
        working-directory: telemedicine_backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: telemedicine_backend/package-lock.json

      - run: npm ci
      - run: npm run migrate:status
        env:
          NODE_ENV: test

  # ── Backend Deploy (Render) ───────────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    needs: [backend, patient-app, doctor-app, migrations]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Wait for backend health check
        env:
          PUBLIC_BACKEND_URL: https://telemed-backend.onrender.com
        run: |
          echo "Render autoDeploy is enabled via render.yaml; validating public backend readiness."
          HEALTH_URL="${PUBLIC_BACKEND_URL%/}/health"
          echo "Checking health endpoint: $HEALTH_URL"

          for attempt in $(seq 1 20); do
            if curl --fail --silent "$HEALTH_URL" >/dev/null; then
              echo "Backend is healthy."
              exit 0
            fi

            echo "Attempt $attempt/20 failed. Waiting 20 seconds..."
            sleep 20
          done

          echo "Backend health check failed. Verify Render service status and deployment logs."
          exit 1
